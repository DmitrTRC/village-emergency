<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" role="img" aria-label="Архитектура village-emrg: PWA, Hono API, PostgreSQL, S3, Telegram">
  <title>village-emrg — архитектура</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1526"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18233a"/>
      <stop offset="1" stop-color="#131d2e"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3b3b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff3b3b" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .lbl   { fill:#e8edf6; font-weight:700; }
      .sub   { fill:#9fb0c8; font-weight:500; }
      .muted { fill:#5f7088; font-weight:500; }
      .tag   { fill:#c7d3e6; font-weight:600; }
      .edge  { stroke-linecap:round; fill:none; }

      .dash  { stroke-dasharray:6 10; animation:flow 1.1s linear infinite; }
      @keyframes flow { to { stroke-dashoffset:-32; } }

      .pulse { animation:breathe 2.6s ease-in-out infinite; transform-origin:center; }
      @keyframes breathe { 0%,100% { opacity:.45; } 50% { opacity:1; } }

      .ring  { animation:ring 2.6s ease-out infinite; transform-origin:450px 120px; }
      @keyframes ring { 0% { transform:scale(.6); opacity:.6; } 100% { transform:scale(1.7); opacity:0; } }

      .blink { animation:blink 1.8s ease-in-out infinite; }
      @keyframes blink { 0%,100% { opacity:.35; } 50% { opacity:1; } }
    </style>
  </defs>

  <rect width="900" height="660" fill="url(#bg)"/>
  <rect width="900" height="660" fill="#0b1220" opacity="0"/>

  <text x="40" y="44" class="lbl" font-size="22">village-emrg</text>
  <text x="40" y="68" class="muted" font-size="13">offline-first тревожная кнопка дачного посёлка · один Node-процесс, один VPS</text>

  <!-- ===== PWA ===== -->
  <g>
    <circle class="ring" cx="450" cy="120" r="40" fill="none" stroke="#ff3b3b" stroke-width="2"/>
    <rect x="250" y="92" width="400" height="118" rx="16" fill="url(#card)" stroke="#27365a" stroke-width="1.5"/>
    <circle cx="288" cy="124" r="16" fill="url(#glowRed)"/>
    <circle cx="288" cy="124" r="9" fill="#ff3b3b" class="pulse"/>
    <text x="316" y="121" class="lbl" font-size="16">PWA</text>
    <text x="316" y="140" class="sub" font-size="12">React · Vite · Workbox Service Worker</text>
    <g font-size="11" class="tag">
      <text x="272" y="178">⏳ IndexedDB-очередь</text>
      <text x="430" y="178">🔔 Push (VAPID)</text>
      <text x="555" y="178">⚡ SSE-лента</text>
    </g>
  </g>

  <!-- PWA <-> API link -->
  <path id="link" class="edge dash" d="M450 210 L450 280" stroke="#3d8bff" stroke-width="2.5"/>
  <text x="462" y="248" class="muted" font-size="11">HTTPS · REST + SSE</text>
  <circle r="4" fill="#3ddc84">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M450 210 L450 280"/>
  </circle>
  <circle r="4" fill="#3d8bff">
    <animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite" path="M450 280 L450 210"/>
  </circle>

  <!-- ===== API ===== -->
  <g>
    <rect x="190" y="280" width="520" height="150" rx="16" fill="url(#card)" stroke="#27365a" stroke-width="1.5"/>
    <text x="214" y="312" class="lbl" font-size="16">Hono API</text>
    <text x="300" y="312" class="sub" font-size="12">Node 22 · Docker · Caddy (auto-TLS) · один процесс</text>
    <g font-size="11.5" class="tag">
      <rect x="214" y="330" width="140" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="226" y="350">Auth · Telegram</text>
      <rect x="366" y="330" width="150" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="378" y="350">Incident CRUD + FSM</text>
      <rect x="528" y="330" width="160" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="540" y="350">Push dispatcher</text>
      <rect x="214" y="372" width="150" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="226" y="392">SSE hub (NOTIFY)</text>
      <rect x="376" y="372" width="140" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="388" y="392">S3 pre-signed PUT</text>
      <rect x="528" y="372" width="160" height="30" rx="8" fill="#0f1830" stroke="#27365a"/>
      <text x="540" y="392">Telegram bot (grammy)</text>
    </g>
  </g>

  <!-- API -> backing services -->
  <path class="edge dash" d="M300 430 C300 462 200 462 200 506" stroke="#3ddc84" stroke-width="2"/>
  <path class="edge dash" d="M450 430 L450 506" stroke="#ffb020" stroke-width="2"/>
  <path class="edge dash" d="M600 430 C600 462 700 462 700 506" stroke="#3d8bff" stroke-width="2"/>

  <circle r="3.5" fill="#3ddc84"><animateMotion dur="1.8s" repeatCount="indefinite" path="M300 430 C300 462 200 462 200 506"/></circle>
  <circle r="3.5" fill="#ffb020"><animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite" path="M450 430 L450 506"/></circle>
  <circle r="3.5" fill="#3d8bff"><animateMotion dur="1.8s" begin="1s" repeatCount="indefinite" path="M600 430 C600 462 700 462 700 506"/></circle>

  <!-- ===== backing services ===== -->
  <g>
    <rect x="100" y="506" width="200" height="84" rx="14" fill="url(#card)" stroke="#27365a" stroke-width="1.5"/>
    <circle cx="132" cy="540" r="6" fill="#3ddc84" class="blink"/>
    <text x="150" y="538" class="lbl" font-size="14">PostgreSQL 16</text>
    <text x="124" y="566" class="sub" font-size="11">Selectel Managed · LISTEN/NOTIFY</text>
    <text x="124" y="582" class="muted" font-size="10.5">журнал событий · без Redis</text>
  </g>
  <g>
    <rect x="350" y="506" width="200" height="84" rx="14" fill="url(#card)" stroke="#27365a" stroke-width="1.5"/>
    <circle cx="382" cy="540" r="6" fill="#ffb020" class="blink"/>
    <text x="400" y="538" class="lbl" font-size="14">Object Storage</text>
    <text x="374" y="566" class="sub" font-size="11">Selectel S3 · pre-signed</text>
    <text x="374" y="582" class="muted" font-size="10.5">фото (WebP) · приватный бакет</text>
  </g>
  <g>
    <rect x="600" y="506" width="200" height="84" rx="14" fill="url(#card)" stroke="#27365a" stroke-width="1.5"/>
    <circle cx="632" cy="540" r="6" fill="#3d8bff" class="blink"/>
    <text x="650" y="538" class="lbl" font-size="14">Telegram API</text>
    <text x="624" y="566" class="sub" font-size="11">auth · fallback-push командиру</text>
    <text x="624" y="582" class="muted" font-size="10.5">deep-link рядом с web-push</text>
  </g>

  <text x="860" y="648" text-anchor="end" class="muted" font-size="10.5">draft → delivered → accepted → closed · UUIDv7 · append-only events</text>
</svg>
