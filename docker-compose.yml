services:
  app:
    image: ghcr.io/dmitrtrc/village-emergency-app:${RELEASE_TAG}
    env_file: .env
    restart: unless-stopped
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  caddy:
    image: ghcr.io/dmitrtrc/village-emergency-web:${RELEASE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
