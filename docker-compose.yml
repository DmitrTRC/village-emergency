services:
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE: /api
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
        VITE_TG_BOT: ${VITE_TG_BOT}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
